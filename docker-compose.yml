services:
  backend:
    build:
      context: ./backend
    container_name: accessibility-sandbox-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=dev-secret-change-later
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: accessibility-sandbox-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  backend_data: